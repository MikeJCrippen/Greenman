<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Green Man 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── 2026 design tokens ── */
    --ink:        #2a2240;
    --ink-soft:   #3a2d5a;
    --plum:       #4a3a6a;
    --violet:     #8372b8;
    --lilac:      #c4b7e0;
    --lilac-pale: #e3dbef;
    --forest:     #2f5a44;
    --moss:       #4a8a6c;
    --sage:       #8cc0a0;
    --sage-pale:  #b6d9c1;
    --sage-mist:  #d8ead9;
    --sage-cream: #eaf1e4;
    --blush:      #e9c4c8;
    --cream:      #f5efe0;
    --paper:      #fbf6e8;
    --stamp:      #c94d4d;
    --sun:        #e8a94a;

    /* ── Legacy aliases — removed as each screen is rebuilt ── */
    --forest-dk:  #0f1f0f;
    --bark:       #1e2f1a;
    --moss-dk:    #2d4a27;
    --amber:      #c8933a;
    --amber-dim:  #8a6025;
    --mist:       #b8c4a8;
    --must:       #e8a020;
    --want:       #7ab648;
    --maybe:      #5b8fc4;
    --nope:       #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', 'Helvetica Neue', Helvetica, system-ui, sans-serif;
    background: var(--sage-mist);
    color: var(--forest);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 20px 12px;
    background: linear-gradient(180deg, var(--forest-dk) 0%, transparent 100%);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1;
  }

  h1 span { color: var(--amber); font-style: italic; font-weight: 400; }

  .festival-dates {
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--moss-dk);
    background: transparent;
    color: var(--mist);
    font-family: 'Inter', 'Helvetica Neue', Helvetica, system-ui, sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .day-tab.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--forest-dk);
    font-weight: 500;
  }

  .stage-filter-row {
    padding: 10px 20px 0;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  .stage-filter-row::-webkit-scrollbar { display: none; }

  .stage-pill {
    flex-shrink: 0;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(200,147,58,0.3);
    background: transparent;
    color: var(--mist);
    font-family: 'Inter', 'Helvetica Neue', Helvetica, system-ui, sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .stage-pill.active {
    background: rgba(200,147,58,0.15);
    border-color: var(--amber);
    color: var(--amber);
  }

  .act-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px 90px;
    scrollbar-width: none;
  }
  .act-list::-webkit-scrollbar { display: none; }

  .time-block-header {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber-dim);
    padding: 16px 4px 8px;
    font-weight: 500;
  }

  .act-card {
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
    position: relative;
    min-height: 90px;
    display: flex;
    align-items: flex-end;
    cursor: pointer;
    transition: transform 0.15s;
    background: var(--bark);
  }

  .act-card:active { transform: scale(0.98); }

  .act-card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    transition: opacity 0.5s ease;
  }

  .act-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,20,10,0.1) 0%, rgba(10,20,10,0.7) 60%, rgba(10,20,10,0.9) 100%);
    border-radius: 12px;
  }

  .act-card-content {
    position: relative;
    z-index: 2;
    padding: 12px 14px;
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 10px;
  }

  .act-info { flex: 1; min-width: 0; }

  .act-name {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .act-meta {
    font-size: 12px;
    color: var(--mist);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .act-meta .dot { color: var(--amber-dim); }

  .rating-widget {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .rating-dots { display: flex; gap: 4px; }

  .rating-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .rating-btn:active { transform: scale(1.2); }

  .act-card[data-rating="3"] .rating-btn[data-r="3"] { background: var(--must); border-color: var(--must); }
  .act-card[data-rating="2"] .rating-btn[data-r="2"] { background: var(--want); border-color: var(--want); }
  .act-card[data-rating="1"] .rating-btn[data-r="1"] { background: var(--maybe); border-color: var(--maybe); }
  .act-card[data-rating="0"] .rating-btn[data-r="0"] { background: var(--nope); border-color: var(--nope); }

  .act-card[data-rating="3"] { box-shadow: 0 0 0 2px var(--must); }
  .act-card[data-rating="2"] { box-shadow: 0 0 0 2px var(--want); }
  .act-card[data-rating="1"] { box-shadow: 0 0 0 2px var(--maybe); }
  .act-card[data-rating="0"] { opacity: 0.45; }

  .rating-label { font-size: 10px; color: var(--mist); letter-spacing: 0.05em; }

  /* ── Bottom nav ── */
  nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    display: flex;
    gap: 4px;
    padding: 12px 8px 10px;
    background: var(--sage-cream);
    border-top: 1px solid rgba(47,90,68,0.12);
    box-shadow: 0 -4px 20px -12px rgba(47,90,68,0.25);
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    min-height: 56px;
    padding: 6px 0 4px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-family: 'Inter', 'Helvetica Neue', Helvetica, system-ui, sans-serif;
    font-size: 12px;
    color: rgba(47,90,68,0.65);
    font-weight: 500;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.18s;
  }

  .nav-btn.active {
    color: var(--forest);
    font-weight: 600;
  }

  .nav-pill {
    width: 64px;
    height: 32px;
    border-radius: 16px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.18s;
  }

  .nav-btn.active .nav-pill { background: var(--sage); }

  .nav-btn[data-view="picks"].active svg path { fill: currentColor; }

  .empty-state { text-align: center; padding: 60px 30px; color: var(--mist); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ══════════════════════════════════════
     NOW & NEXT — SWIPE CAROUSEL
  ══════════════════════════════════════ */
  #view-now {
    display: none;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  .stage-dots {
    display: flex;
    gap: 8px;
    padding: 0 4px 4px;
  }

  .stage-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--moss-dk);
    transition: all 0.3s;
  }
  .stage-dot.active {
    background: var(--amber);
    width: 20px;
    border-radius: 3px;
  }

  .stage-carousel {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
    touch-action: pan-y;
  }

  .stage-slide {
    flex: 0 0 100%;
    height: 100%;
    padding: 8px 16px 90px;
    overflow-y: auto;
    scrollbar-width: none;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .stage-slide::-webkit-scrollbar { display: none; }

  /* Stage name banner */
  .stage-banner {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 13px;
    font-style: italic;
    color: var(--amber);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* Now/Next slot cards */
  .slot-card {
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    margin-bottom: 12px;
    background: var(--bark);
    min-height: 160px;
    display: flex;
    align-items: flex-end;
  }

  .slot-card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
  }

  .slot-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(8,16,8,0.05) 0%, rgba(8,16,8,0.75) 55%, rgba(8,16,8,0.95) 100%);
  }

  .slot-label {
    position: absolute;
    top: 14px; left: 14px;
    z-index: 3;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .slot-label.now {
    background: var(--amber);
    color: var(--forest-dk);
  }

  .slot-label.next {
    background: rgba(255,255,255,0.12);
    color: var(--cream);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .slot-content {
    position: relative;
    z-index: 2;
    padding: 14px 16px;
    width: 100%;
  }

  .slot-artist {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .slot-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--mist);
  }

  .slot-timer {
    font-size: 12px;
    color: var(--amber);
    font-weight: 500;
  }

  .rating-pip {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .pip-3 { background: var(--must); }
  .pip-2 { background: var(--want); }
  .pip-1 { background: var(--maybe); }

  .slot-nothing {
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    border: 1px dashed var(--moss-dk);
    margin-bottom: 12px;
  }

  .slot-nothing p {
    font-size: 13px;
    color: var(--mist);
    font-style: italic;
  }

  .swipe-hint {
    text-align: center;
    font-size: 11px;
    color: var(--moss-dk);
    padding: 6px 0;
    letter-spacing: 0.05em;
  }

  /* ══════════════════════════════════════
     MY PICKS VIEW
  ══════════════════════════════════════ */
  #view-picks {
    display: none;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  .picks-day-header {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 18px;
    font-style: italic;
    color: var(--amber);
    padding: 16px 4px 10px;
    border-bottom: 1px solid var(--moss-dk);
    margin-bottom: 10px;
  }

  .picks-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px;
    border-radius: 10px;
    margin-bottom: 6px;
    background: rgba(30,47,26,0.5);
    position: relative;
  }

  .picks-row.clash { border-left: 3px solid #e05a5a; }

  .picks-time {
    font-size: 12px;
    color: var(--mist);
    min-width: 42px;
    text-align: right;
    flex-shrink: 0;
  }

  .picks-artist {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--cream);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .picks-stage { font-size: 11px; color: var(--mist); flex-shrink: 0; }

  .clash-label {
    position: absolute;
    right: 8px; top: 4px;
    font-size: 10px;
    color: #e05a5a;
    letter-spacing: 0.05em;
  }

  .no-picks {
    text-align: center;
    padding: 50px 30px;
    color: var(--mist);
    font-size: 14px;
    line-height: 1.7;
  }

  /* ══════════════════════════════════════
     BROWSE / LINE-UP (2026 design)
  ══════════════════════════════════════ */

  #view-browse { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .browse-header {
    background: var(--sage);
    color: var(--ink);
    padding: max(12px, env(safe-area-inset-top)) 20px 0;
    flex-shrink: 0;
  }

  .browse-eyebrow {
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.65;
    text-transform: uppercase;
  }

  .browse-titlerow {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-top: 4px;
    margin-bottom: 18px;
  }

  h1.browse-h1 {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--ink);
    line-height: 1.1;
  }

  .browse-search-btn {
    width: 40px; height: 40px;
    border-radius: 20px;
    background: rgba(42,34,64,0.08);
    border: 1px solid rgba(42,34,64,0.15);
    color: var(--ink);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  /* Override old day-tab styles */
  .day-tabs { display: flex; gap: 6px; overflow: visible; padding-bottom: 14px; scrollbar-width: auto; }

  .day-tab {
    flex: 1;
    padding: 10px 4px 9px;
    border: none;
    cursor: pointer;
    border-radius: 14px;
    background: transparent;
    color: rgba(42,34,64,0.65);
    display: flex; flex-direction: column; gap: 2px; align-items: center;
    transition: background .15s;
    -webkit-tap-highlight-color: transparent;
  }

  .day-tab.active { background: var(--ink); color: var(--cream); font-weight: normal; }

  .day-tab-label {
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.8px;
    opacity: 0.75;
  }

  .day-tab.active .day-tab-label { opacity: 0.55; color: var(--cream); }

  .day-tab-date {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 18px; font-weight: 600;
  }

  .browse-scallop { flex-shrink: 0; line-height: 0; }

  .browse-body {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
    position: relative;
    background: var(--sage-mist);
    padding-bottom: 80px;
  }
  .browse-body::-webkit-scrollbar { display: none; }

  /* Stage sections */
  .stage-section { margin-bottom: 26px; }

  .stage-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 22px 8px;
  }

  .stage-dot-2026 {
    width: 10px; height: 10px;
    border-radius: 50%; flex-shrink: 0;
  }

  .stage-name-2026 {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 22px; font-weight: 600;
    color: var(--forest); letter-spacing: -0.3px; white-space: nowrap;
  }

  .stage-divider-2026 {
    flex: 1; min-width: 12px;
    height: 1px; background: rgba(47,90,68,0.2);
  }

  .stage-count-2026 {
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    font-size: 11px; color: rgba(47,90,68,0.6);
    letter-spacing: 1px; flex-shrink: 0;
  }

  .stage-card-2026 {
    margin: 0 16px;
    background: var(--sage-cream);
    border-radius: 20px;
    box-shadow: 0 1px 0 rgba(47,90,68,0.05), 0 8px 24px -18px rgba(47,90,68,0.35);
    border: 1px solid rgba(47,90,68,0.1);
    overflow: hidden;
  }

  /* Lineup rows */
  .lineup-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px 12px 16px;
    border-bottom: 1px solid rgba(47,90,68,0.1);
    transition: opacity 0.15s;
  }
  .lineup-row:last-child { border-bottom: none; }
  .lineup-row.skipped { opacity: 0.45; }

  .lineup-time { width: 46px; flex-shrink: 0; }

  .lineup-time-start {
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    font-size: 14px; font-weight: 600; color: var(--forest); line-height: 1.1;
  }

  .lineup-time-end {
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    font-size: 10px; color: rgba(47,90,68,0.55); margin-top: 1px;
  }

  .lineup-portrait { display: block; flex-shrink: 0; }

  .lineup-info { flex: 1; min-width: 0; }

  .lineup-artist {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 16px; font-weight: 600; color: var(--forest);
    letter-spacing: -0.2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .lineup-rating { display: flex; align-items: center; flex-shrink: 0; }

  .lineup-skip-btn {
    width: 32px; height: 44px;
    border: none; background: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: rgba(47,90,68,0.3);
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s; padding: 0; border-radius: 8px;
  }
  .lineup-skip-btn.skipped { color: var(--stamp); }

  .lineup-star-btn {
    width: 34px; height: 44px;
    border: none; background: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    padding: 0; border-radius: 8px;
  }

  .end-of-day {
    text-align: center;
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    font-size: 10px; letter-spacing: 1.5px;
    color: rgba(47,90,68,0.5); padding: 10px 0 24px;
  }

  /* ══════════════════════════════════════
     ITINERARY / MY PLAN (2026 design)
  ══════════════════════════════════════ */

  #view-picks { flex: 1; overflow: hidden; }

  .itin-header {
    background: var(--forest);
    color: var(--cream);
    padding: max(12px, env(safe-area-inset-top)) 20px 0;
    flex-shrink: 0;
  }

  .itin-eyebrow {
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    font-size: 11px; letter-spacing: 2px; opacity: 0.7; text-transform: uppercase;
  }

  .itin-titlerow {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    margin-top: 4px; margin-bottom: 16px;
  }

  h1.itin-h1 {
    font-family: 'Fraunces', 'Cooper Black', Georgia, serif;
    font-size: 34px; font-weight: 600;
    letter-spacing: -0.5px; color: var(--cream); line-height: 1.1;
  }

  .itin-share-btn {
    width: 40px; height: 40px; border-radius: 20px;

function loadState() {
  try { ratings    = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { ratings = {}; }
  try { photoCache = JSON.parse(localStorage.getItem(PHOTO_CACHE_KEY) || '{}'); } catch(e) { photoCache = {}; }
}

function saveRatings()    { localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings)); }
function savePhotoCache() { localStorage.setItem(PHOTO_CACHE_KEY, JSON.stringify(photoCache)); }

function actKey(act) { return `${act.stage}||${act.start}`; }
function getRating(act) { return ratings[actKey(act)]; }

function setRating(act, r) {
  const key = actKey(act);
  if (ratings[key] === r) { delete ratings[key]; }
  else { ratings[key] = r; }
  saveRatings();
  // Trigger photo fetch if rated 1, 2 or 3
  const newR = ratings[key];
  if (newR !== undefined && newR > 0) {
    fetchArtistPhoto(act.artist);
  }
}

// LAST.FM PHOTO FETCH
// ══════════════════════════════════════════
async function fetchArtistPhoto(artist) {
  if (!LASTFM_API_KEY) return;                    // no key yet, skip
  if (photoCache[artist] !== undefined) return;   // already fetched (even if null)

  try {
    const url = `https://ws.audioscrobbler.com/2.0/?method=artist.getinfo&artist=${encodeURIComponent(artist)}&api_key=${LASTFM_API_KEY}&format=json`;
    const res  = await fetch(url);
    const data = await res.json();
    const images = data?.artist?.image;
    // Last.fm returns array of sizes; grab 'extralarge' or 'large'
    const img = images?.find(i => i.size === 'extralarge') || images?.find(i => i.size === 'large');
    const src = img?.['#text'] || null;
    // Last.fm sometimes returns an empty string for missing images
    photoCache[artist] = (src && src.length > 10) ? src : null;
    savePhotoCache();
    // Update any visible cards for this artist
    updateCardPhoto(artist);
  } catch(e) {
    photoCache[artist] = null;
    savePhotoCache();
  }
}

function getPhoto(artist) {
  return photoCache[artist] || null;
}

function updateCardPhoto(artist) {
  // Update browse cards
  document.querySelectorAll('.act-card').forEach(card => {
    if (card.dataset.artist === artist) {
      applyCardPhoto(card, artist);
    }
  });
}

function applyCardPhoto(card, artist) {
  const photo = getPhoto(artist);
  const bg = card.querySelector('.act-card-bg');
  if (photo && bg) {
    bg.style.backgroundImage = `url('${photo}')`;
    bg.style.background = '';
  }
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function fmtMinsRemaining(isoEnd) {
  const mins = Math.round((new Date(isoEnd) - getNow()) / 60000);
  if (mins <= 0) return 'ending';
  return `${mins} min${mins !== 1 ? 's' : ''} left`;
}

function fmtMinsUntil(isoStart) {
  const mins = Math.round((new Date(isoStart) - getNow()) / 60000);
  if (mins < 60) return `in ${mins} min${mins !== 1 ? 's' : ''}`;
  const hrs = Math.floor(mins / 60);
  const rem = mins % 60;
  return rem > 0 ? `in ${hrs}h ${rem}m` : `in ${hrs}h`;
}

  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.classList.add('lineup-portrait');
  svg.innerHTML = `
    <defs>
      <clipPath id="${uid}c"><path d="M 50 2 C 74 2 94 18 96 44 C 98 68 86 92 60 96 C 38 99 12 90 6 66 C 0 42 10 12 50 2 Z"/></clipPath>
      <linearGradient id="${uid}g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="oklch(0.72 0.14 ${hue})"/>
        <stop offset="1" stop-color="oklch(0.42 0.12 ${h2})"/>
      </linearGradient>
    </defs>
    <g clip-path="url(#${uid}c)">
      <rect width="100" height="100" fill="url(#${uid}g)"/>

  `;
  return svg;
}

function buildStarSVG(filled) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '18'); svg.setAttribute('height', '18'); svg.setAttribute('viewBox', '0 0 24 24');
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'M12 2 L14.9 8.9 L22.3 9.6 L16.7 14.6 L18.4 22 L12 18 L5.6 22 L7.3 14.6 L1.7 9.6 L9.1 8.9 Z');
  path.setAttribute('fill', filled ? 'var(--sun)' : 'none');
  path.setAttribute('stroke', filled ? 'var(--sun)' : 'rgba(47,90,68,0.25)');
  path.setAttribute('stroke-width', '1.6');
  path.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(path);
  return svg;
}

function refreshLineupRow(row, act) {
  const rating = getRating(act);
  const isSkip = rating === 0;
  const isRated = rating !== undefined && rating > 0;
  row.classList.toggle('skipped', isSkip);
  const skipBtn = row.querySelector('.lineup-skip-btn');
  if (skipBtn) skipBtn.classList.toggle('skipped', isSkip);
  row.querySelectorAll('.lineup-star-btn').forEach((btn, i) => {
    const path = btn.querySelector('path');
    if (!path) return;
    const filled = isRated && (i + 1) <= rating;
    path.setAttribute('fill', filled ? 'var(--sun)' : 'none');
    path.setAttribute('stroke', filled ? 'var(--sun)' : 'rgba(47,90,68,0.25)');
  });
}

function buildLineupRow(act, hue) {
  const rating = getRating(act);
  const isSkip = rating === 0;
  const isRated = rating !== undefined && rating > 0;

  const row = document.createElement('div');
  row.className = 'lineup-row' + (isSkip ? ' skipped' : '');

  const timeDiv = document.createElement('div');
  timeDiv.className = 'lineup-time';
  timeDiv.innerHTML = `<div class="lineup-time-start">${fmtTime(act.start)}</div><div class="lineup-time-end">${fmtTime(act.end)}</div>`;

  const info = document.createElement('div');
  info.className = 'lineup-info';
  info.innerHTML = `<div class="lineup-artist">${act.artist}</div>`;

  const ratingDiv = document.createElement('div');
  ratingDiv.className = 'lineup-rating';

  const skipBtn = document.createElement('button');
  skipBtn.className = 'lineup-skip-btn' + (isSkip ? ' skipped' : '');
  skipBtn.title = 'Skip';
  skipBtn.textContent = '✕';
  skipBtn.addEventListener('click', e => {
    e.stopPropagation();
    setRating(act, 0);
    refreshLineupRow(row, act);
  });
  ratingDiv.appendChild(skipBtn);

  [1, 2, 3].forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'lineup-star-btn';
    btn.title = n + (n === 1 ? ' star' : ' stars');
    btn.appendChild(buildStarSVG(isRated && n <= rating));
    btn.addEventListener('click', e => {
      e.stopPropagation();
      setRating(act, n);
      refreshLineupRow(row, act);
    });
    ratingDiv.appendChild(btn);
  });

  row.appendChild(timeDiv);
  row.appendChild(buildPortrait(act.artist, hue));
  row.appendChild(info);
  row.appendChild(ratingDiv);
  return row;
}

function buildStagePills() {
  const container = document.getElementById('stage-pills');
  container.innerHTML = '';

  const allPill = document.createElement('button');
  allPill.className = 'stage-pill' + (activeStage === 'all' ? ' active' : '');
  allPill.textContent = 'All stages';
  allPill.onclick = () => { activeStage = 'all'; buildStagePills(); renderActList(); };
  container.appendChild(allPill);

  const stagesForDay = [...new Set(FESTIVAL_DATA.acts.filter(a => a.day === activeDay).map(a => a.stage))];
  FESTIVAL_DATA.stages.forEach(s => {
    if (!stagesForDay.includes(s)) return;
    const pill = document.createElement('button');
    pill.className = 'stage-pill' + (activeStage === s ? ' active' : '');
    pill.textContent = s;
    pill.onclick = () => { activeStage = s; buildStagePills(); renderActList(); };
    container.appendChild(pill);
  });
}

function renderActList() {
  const container = document.getElementById('act-list');
  let acts = FESTIVAL_DATA.acts.filter(a => a.day === activeDay);
  if (activeStage !== 'all') acts = acts.filter(a => a.stage === activeStage);
  acts.sort((a, b) => a.start.localeCompare(b.start));

  if (acts.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🌿</div><p>Nothing on.<br>Try another day or stage.</p></div>';
    return;
  }

  const blocks = {};
  acts.forEach(act => {
    const hour = act.start.slice(0, 13);
    if (!blocks[hour]) blocks[hour] = [];
    blocks[hour].push(act);
  });

  container.innerHTML = '';
  Object.entries(blocks).forEach(([hour, blockActs]) => {
    const label = document.createElement('div');
    label.className = 'time-block-header';
    label.textContent = fmtTime(hour + ':00:00');
    container.appendChild(label);
    blockActs.forEach(act => container.appendChild(buildActCard(act)));
  });
}

function buildActCard(act) {
  const rating = getRating(act);
  const card = document.createElement('div');
  card.className = 'act-card';
  card.dataset.artist = act.artist;
  if (rating !== undefined) card.dataset.rating = rating;

  const bg = document.createElement('div');
  bg.className = 'act-card-bg';
  const photo = getPhoto(act.artist);
  if (photo) {
    bg.style.backgroundImage = `url('${photo}')`;
  } else {
    bg.style.background = STAGE_GRADIENTS[act.stage] || STAGE_GRADIENTS['Mountain Stage'];
  }
  card.appendChild(bg);

  const content = document.createElement('div');
  content.className = 'act-card-content';

  const info = document.createElement('div');
  info.className = 'act-info';
  info.innerHTML = `
    <div class="act-name">${act.artist}</div>
    <div class="act-meta">
      <span>${fmtTime(act.start)}–${fmtTime(act.end)}</span>
      <span class="dot">·</span>
      <span>${act.stage}</span>
    </div>
  `;

  const widget = document.createElement('div');
  widget.className = 'rating-widget';
  const dots = document.createElement('div');
  dots.className = 'rating-dots';

  [0, 1, 2, 3].forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'rating-btn';
    btn.dataset.r = r;
    btn.title = RATING_CONFIG[r].label;
    btn.textContent = RATING_CONFIG[r].emoji;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      setRating(act, r);
      const newRating = getRating(act);
      if (newRating !== undefined) {
        card.dataset.rating = newRating;
      } else {
        delete card.dataset.rating;
      }
      if (newRating === 0) card.style.opacity = '0.45';
      else card.style.opacity = '';
      // If a positive rating, apply photo if we already have it
      if (newRating > 0 && getPhoto(act.artist)) {
        applyCardPhoto(card, act.artist);
      }
      ratingLabel.textContent = newRating !== undefined ? RATING_CONFIG[newRating].label : 'Rate';
    });
    dots.appendChild(btn);
  });

  const ratingLabel = document.createElement('div');
  ratingLabel.className = 'rating-label';
  ratingLabel.textContent = rating !== undefined ? RATING_CONFIG[rating].label : 'Rate';

  widget.appendChild(dots);
  widget.appendChild(ratingLabel);
  content.appendChild(info);
  content.appendChild(widget);
  card.appendChild(content);
  return card;
}

    slide.appendChild(banner);

    const stageActs = FESTIVAL_DATA.acts
      .filter(a => a.stage === stage)
      .sort((a, b) => a.start.localeCompare(b.start));

    const onNow  = stageActs.find(a => new Date(a.start) <= now && new Date(a.end) > now);
    const onNext = stageActs.find(a => new Date(a.start) > now);

    if (!onNow && !onNext) {
      const el = document.createElement('div');
      el.className = 'slot-nothing';
      el.innerHTML = '<p>Nothing on at this stage right now</p>';
      slide.appendChild(el);
    } else {
      if (onNow)  slide.appendChild(buildSlotCard(onNow,  true,  now));
      if (onNext) slide.appendChild(buildSlotCard(onNext, false, now));
    }

    // Swipe hint only on first slide
    if (i === 0) {
      const hint = document.createElement('div');
      hint.className = 'swipe-hint';
      hint.textContent = '← swipe to see other stages →';
      slide.appendChild(hint);
    }
  });

  updateCarousel();
}

function buildSlotCard(act, isNow, now) {
  const card = document.createElement('div');
  card.className = 'slot-card';

  const bg = document.createElement('div');
  bg.className = 'slot-card-bg';
  const photo = getPhoto(act.artist);
  if (photo) {
    bg.style.backgroundImage = `url('${photo}')`;
    bg.style.backgroundSize = 'cover';
    bg.style.backgroundPosition = 'center top';
  } else {
    bg.style.background = STAGE_GRADIENTS[act.stage] || STAGE_GRADIENTS['Mountain Stage'];
  }
  card.appendChild(bg);

  const label = document.createElement('div');
  label.className = `slot-label ${isNow ? 'now' : 'next'}`;
  label.textContent = isNow ? '● Live now' : 'Up next';
  card.appendChild(label);

  const rating = getRating(act);
  let pipHtml = '';
  if (rating !== undefined && rating > 0) {
    pipHtml = `<span class="rating-pip pip-${rating}"></span>`;
  }

  const content = document.createElement('div');
  content.className = 'slot-content';
  content.innerHTML = `
    <div class="slot-artist">${act.artist}</div>
    <div class="slot-meta">
      ${pipHtml}
      <span>${fmtTime(act.start)}–${fmtTime(act.end)}</span>
      <span class="slot-timer">${isNow ? fmtMinsRemaining(act.end) : fmtMinsUntil(act.start)}</span>
    </div>
  `;
  card.appendChild(content);
  return card;
}

function updateCarousel() {
  const slides = document.querySelectorAll('.stage-slide');
  slides.forEach((slide, i) => {
    slide.style.transform = `translateX(${(i - carouselIdx) * 100}%)`;
  });
  document.querySelectorAll('.stage-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === carouselIdx);
  });
}

function initCarouselSwipe() {
  const carousel = document.getElementById('stage-carousel');

  carousel.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  carousel.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    // Only register as horizontal swipe if more horizontal than vertical
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      if (dx < 0 && carouselIdx < NOW_NEXT_STAGES.length - 1) carouselIdx++;
      else if (dx > 0 && carouselIdx > 0) carouselIdx--;
      updateCarousel();
    }
  }, { passive: true });
}

// ══════════════════════════════════════════
// ITINERARY VIEW (2026 design)
// ══════════════════════════════════════════
const STAGE_SHORT = {
  'Mountain Stage': 'Mountain', 'Far Out': 'Far Out', 'Walled Garden': 'Walled',
  'Rising': 'Rising', 'Chai Wallahs': 'Chai', 'Round The Twist': 'Round',
  'Babbling Tongues': 'Babbling', 'Cinedrome': 'Cinema',
  'Wishbone': 'Wishbone', 'Rough Trade tent signings': 'Rough Trade',
};

function buildItineraryCard(act, isClash) {
  const hue = STAGE_HUES[act.stage] || 155;
  const rating = getRating(act);
  const isRated = rating !== undefined && rating > 0;

  const card = document.createElement('div');
  card.className = 'itin-card' + (isClash ? ' clash' : '');

  const rail = document.createElement('div');
  rail.className = 'itin-rail';
  rail.style.background = isClash ? 'var(--stamp)' : `oklch(0.55 0.13 ${hue})`;
  card.appendChild(rail);

  const inner = document.createElement('div');
  inner.className = 'itin-card-inner';

  inner.appendChild(buildPortrait(act.artist, hue, 52));

  const info = document.createElement('div');
  info.style.cssText = 'flex:1;min-width:0';

  const metaRow = document.createElement('div');
  metaRow.className = 'itin-meta';
  metaRow.innerHTML = `
    <span class="itin-time">${fmtTime(act.start)}–${fmtTime(act.end)}</span>
    <span class="itin-stage-pill">${(STAGE_SHORT[act.stage] || act.stage).toUpperCase()}</span>
    ${isClash ? '<span class="itin-clash-pill">⚠ CLASH</span>' : ''}
  `;
  info.appendChild(metaRow);

  const artistDiv = document.createElement('div');
  artistDiv.className = 'itin-artist';
  artistDiv.textContent = act.artist;
  info.appendChild(artistDiv);
  inner.appendChild(info);

  const starsRow = document.createElement('div');
  starsRow.style.cssText = 'display:flex;gap:0;align-self:flex-start;padding-top:2px;flex-shrink:0';
  [1, 2, 3].forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'lineup-star-btn';
    btn.appendChild(buildStarSVG(isRated && n <= rating));
    btn.addEventListener('click', e => {
      e.stopPropagation();
      setRating(act, n);
      renderItinerary();
    });
    starsRow.appendChild(btn);
  });
  inner.appendChild(starsRow);
  card.appendChild(inner);
  return card;
}

function renderItinerary() {
  const container = document.getElementById('picks-list');
  container.innerHTML = '';

  const allRated = FESTIVAL_DATA.acts.filter(a => {
    const r = getRating(a); return r !== undefined && r > 0;
  });

  // Clash detection
  const clashKeys = new Set();
  for (let i = 0; i < allRated.length; i++) {
    for (let j = i + 1; j < allRated.length; j++) {
      const a = allRated[i], b = allRated[j];
      if (a.day !== b.day) continue;
      if (new Date(a.start) < new Date(b.end) && new Date(b.start) < new Date(a.end)) {
        clashKeys.add(actKey(a)); clashKeys.add(actKey(b));
      }
    }
  }

  // Stat chips
  const totalMins = allRated.reduce((n, a) => n + (new Date(a.end) - new Date(a.start)) / 60000, 0);
  const hrs = Math.floor(totalMins / 60);
  const mins = Math.round(totalMins % 60);
  const clashPairs = Math.round(clashKeys.size / 2);
  const chipsEl = document.getElementById('itin-chips');
  if (chipsEl) {
    chipsEl.innerHTML = '';
    [
      { label: 'Sets', value: allRated.length, warn: false },
      { label: 'Hours', value: `${hrs}h ${mins}m`, warn: false },
      { label: 'Clashes', value: clashPairs, warn: clashPairs > 0 },
    ].forEach(({ label, value, warn }) => {
      const el = document.createElement('div');
      el.className = 'itin-chip' + (warn ? ' warn' : '');
      el.innerHTML = `<div class="itin-chip-label">${label}</div><div class="itin-chip-value">${value}</div>`;
      chipsEl.appendChild(el);
    });
  }

  if (!allRated.length) {
    const empty = document.createElement('div');
    empty.className = 'itin-empty';
    empty.innerHTML = `
      <div class="itin-empty-title">Your itinerary is empty</div>
      <div class="itin-empty-sub">Rate any act in the Line-up with one or more stars and it'll show up here.</div>
    `;
    container.appendChild(empty);
    return;
  }

  const DAY_GROUPS = [
    { key: '2025-08-14', name: 'Thursday', date: '14 Aug' },
    { key: '2025-08-15', name: 'Friday', date: '15 Aug' },
    { key: '2025-08-16', name: 'Saturday', date: '16 Aug' },
    { key: '2025-08-17', name: 'Sunday', date: '17 Aug' },
  ];

  DAY_GROUPS.forEach(({ key, name, date }) => {
    const acts = allRated.filter(a => a.day === key).sort((a, b) => a.start.localeCompare(b.start));
    if (!acts.length) return;

    const group = document.createElement('div');
    group.className = 'itin-day-group';

    const dayHdr = document.createElement('div');
    dayHdr.className = 'itin-day-header';
    dayHdr.innerHTML = `<span class="itin-day-name">${name}</span><span class="itin-day-date">${date.toUpperCase()}</span>`;
    group.appendChild(dayHdr);

    const wrap = document.createElement('div');
    wrap.style.cssText = 'padding:0 16px';

    acts.forEach((act, i) => {
      if (i > 0) {
        const gapMin = Math.round((new Date(act.start) - new Date(acts[i - 1].end)) / 60000);
        if (gapMin > 30) {
          const gapEl = document.createElement('div');
          gapEl.className = 'itin-gap';
          const gH = Math.floor(gapMin / 60), gM = gapMin % 60;
          gapEl.textContent = `↓ ${gH ? gH + 'h ' : ''}${gM ? gM + 'm' : ''} gap`;
          wrap.appendChild(gapEl);
        }
      }
      wrap.appendChild(buildItineraryCard(act, clashKeys.has(actKey(act))));
    });

    group.appendChild(wrap);
    container.appendChild(group);
  });
}

// ══════════════════════════════════════════
// MY PICKS VIEW (legacy — superseded by renderItinerary)
// ══════════════════════════════════════════
function renderPicks() {
  const container = document.getElementById('picks-list');
  container.innerHTML = '';

  const days = [
    { key: '2025-08-14', label: 'Thursday 14th' },
    { key: '2025-08-15', label: 'Friday 15th' },
    { key: '2025-08-16', label: 'Saturday 16th' },
    { key: '2025-08-17', label: 'Sunday 17th' },
  ];

  let anyPicks = false;

  days.forEach(({ key, label }) => {
    const picks = FESTIVAL_DATA.acts
      .filter(a => a.day === key)
      .filter(a => { const r = getRating(a); return r !== undefined && r > 0; })
      .sort((a, b) => a.start.localeCompare(b.start));

    if (picks.length === 0) return;
    anyPicks = true;

    const header = document.createElement('div');
    header.className = 'picks-day-header';
    header.textContent = label;
    container.appendChild(header);

    picks.forEach((act, i) => {
      const isClash = picks.some((other, j) => {
        if (i === j) return false;
        return new Date(other.start) < new Date(act.end) &&
               new Date(other.end) > new Date(act.start);
      });

      const row = document.createElement('div');
      row.className = 'picks-row' + (isClash ? ' clash' : '');
      const r = getRating(act);
      row.innerHTML = `
        <div class="picks-time">${fmtTime(act.start)}</div>
        <span class="rating-pip pip-${r}" style="flex-shrink:0"></span>
        <div class="picks-artist">${act.artist}</div>
        <div class="picks-stage">${act.stage.replace(' Stage','').replace(' tent signings','')}</div>
        ${isClash ? '<div class="clash-label">⚡ clash</div>' : ''}
      `;
      container.appendChild(row);
    });
  });

  if (!anyPicks) {
    container.innerHTML = `<div class="no-picks">
      <p>No picks yet! 🌿<br><br>
      Head to Browse and rate some acts.<br><br>
      ★ Must see &nbsp;·&nbsp; ✦ Want to see &nbsp;·&nbsp; ◦ Maybe</p>
    </div>`;
  }
}

// ══════════════════════════════════════════
// NAV & VIEW SWITCHING
// ══════════════════════════════════════════
function switchView(view) {
  currentView = view;
  ['browse','now','picks'].forEach(v => {
    const el = document.getElementById(`view-${v}`);
    el.style.display = v === view ? 'flex' : 'none';
    el.style.flexDirection = 'column';
  });
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  if (view === 'now')   { carouselIdx = 0; renderNowNext(); }
  if (view === 'picks') renderItinerary();
}

document.getElementById('day-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.day-tab');
  if (!tab) return;
  activeDay = tab.dataset.day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderLineup();
});

// Auto-refresh Now & Next every minute
setInterval(() => { if (currentView === 'now') renderNowNext(); }, 60000);

// INIT

loadState();
initCarouselSwipe();
renderLineup();
switchView('browse');
</script>
